<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POE Heist prices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4efe6;
      color: #1a0e04;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(180deg, #ede5d0 0%, #f4efe6 100%);
      border-bottom: 2px solid #c8a870;
      padding: 1.25rem 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.6rem;
      color: #7a3010;
      text-shadow: 0 1px 0 #fffdf5;
      white-space: nowrap;
    }
    header h1 span { color: #1a0e04; }

    .tab-nav {
      display: flex;
      gap: 0.45rem;
      align-items: center;
    }

    .tab-btn {
      background: #ede5d0;
      border: 1px solid #c8a870;
      color: #6a5030;
      padding: 0.4rem 1.15rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { border-color: #7a3010; color: #1a0e04; background: #e0d4b8; }
    .tab-btn.active {
      background: linear-gradient(180deg, #c87830 0%, #7a3010 100%);
      border-color: #7a3010;
      color: #fffdf5;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.85rem;
      color: #6a5030;
    }

    input[type="text"], input[type="number"] {
      background: #fffdf5;
      border: 1px solid #c8a870;
      color: #1a0e04;
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 160px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="number"] { width: 80px; }
    input:focus { border-color: #7a3010; }

    button#loadBtn {
      background: linear-gradient(180deg, #c87830 0%, #7a3010 100%);
      border: 1px solid #7a3010;
      color: #fffdf5;
      padding: 0.45rem 1.25rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: filter 0.2s;
      white-space: nowrap;
    }
    button#loadBtn:hover { filter: brightness(1.15); }
    button#loadBtn:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

    button#filterBtn {
      background: linear-gradient(180deg, #e8dcc0 0%, #c8a870 100%);
      border: 1px solid #a07840;
      color: #1a0e04;
      padding: 0.45rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: filter 0.2s;
    }
    button#filterBtn:hover { filter: brightness(1.1); }

    .sort-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    select {
      background: #fffdf5;
      border: 1px solid #c8a870;
      color: #1a0e04;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    #status {
      padding: 0.75rem 2rem;
      font-size: 0.85rem;
      color: #6a5030;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #c8a870;
      border-top-color: #7a3010;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #count-badge {
      background: #ede5d0;
      border: 1px solid #c8a870;
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.8rem;
      color: #7a3010;
      font-weight: 600;
    }

    /* Filter bar */
    #type-filter {
      padding: 0 2rem 0.75rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    #type-filter.visible { display: flex; }

    #nameFilter { width: 200px; padding-right: 1.8rem; }

    .search-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }
    .clear-btn {
      position: absolute;
      right: 0.4rem;
      background: none;
      border: none;
      color: #a08050;
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
      padding: 0 0.1rem;
      display: none;
    }
    .clear-btn:hover { color: #7a3010; }
    .clear-btn.visible { display: block; }

    .ilvl-group { display: flex; align-items: center; gap: 0.3rem; }
    .ilvl-label { font-size: 0.78rem; color: #8a6840; font-weight: 600; white-space: nowrap; }
    .ilvl-btn {
      background: #ede5d0;
      border: 1px solid #c8a870;
      color: #6a5030;
      padding: 0.25rem 0.55rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      min-width: 2.1rem;
      text-align: center;
    }
    .ilvl-btn:hover { border-color: #7a3010; color: #1a0e04; background: #e0d4b8; }
    .ilvl-btn.active { background: #7a3010; border-color: #7a3010; color: #fffdf5; }

    .type-btn {
      background: #ede5d0;
      border: 1px solid #c8a870;
      color: #6a5030;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .type-btn:hover { border-color: #7a3010; color: #1a0e04; background: #e0d4b8; }
    .type-btn.active { background: #7a3010; border-color: #7a3010; color: #fffdf5; }

    main { padding: 0.5rem 2rem 3rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.1rem;
    }

    .card {
      background: linear-gradient(160deg, #fffdf5 0%, #f8f0e0 100%);
      border: 1px solid #d4bc8c;
      border-radius: 6px;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
    }
    .card:hover {
      border-color: #7a3010;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px #7a301020;
    }

    .card-top { display: flex; align-items: flex-start; gap: 0.8rem; }

    .card-icon {
      width: 52px; height: 52px;
      object-fit: contain;
      flex-shrink: 0;
      image-rendering: pixelated;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 0.95rem;
      color: #7a3010;
      font-weight: 600;
      line-height: 1.35;
      word-break: break-word;
    }
    .card-name .replica-word { color: #2a6a2a; }

    .card-base { font-size: 0.78rem; color: #8a6840; margin-top: 0.2rem; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.15rem;
      border-top: 1px solid #d4bc8c;
      padding-top: 0.5rem;
    }

    .price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a0e04;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .chaos-icon {
      width: 20px; height: 20px;
      object-fit: contain;
      flex-shrink: 0;
      image-rendering: pixelated;
    }

    .links-table {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      border-top: 1px solid #d4bc8c;
      padding-top: 0.45rem;
      margin-top: 0.1rem;
    }

    .link-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; }

    .link-label { display: flex; gap: 2px; flex-shrink: 0; }
    .link-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 1px solid #b8a070;
      background: #f4efe6;
    }
    .link-dot.filled { background: #c83020; border-color: #e04030; }

    .link-price {
      font-weight: 700;
      color: #1a0e04;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .link-price img { width: 16px; height: 16px; image-rendering: pixelated; }

    .link-listings { color: #8a6840; margin-left: auto; font-size: 0.72rem; }

    .listings { font-size: 0.74rem; color: #8a6840; }

    .change { font-size: 0.78rem; padding: 0.1rem 0.4rem; border-radius: 3px; }
    .change.up   { color: #2a6a2a; background: #e4f4e4; }
    .change.down { color: #8a2020; background: #f4e4e4; }
    .change.flat { color: #8a6840; }

    .empty { grid-column: 1 / -1; text-align: center; color: #8a6840; padding: 4rem; font-size: 1.1rem; }

    .error-msg {
      color: #8a2020;
      background: #fdf0f0;
      border: 1px solid #d4a0a0;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>POE <span>Heist</span> prices</h1>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="replicas">Repliky</button>
      <button class="tab-btn" data-tab="experimented">Experimented Items</button>
    </nav>
  </div>
  <div class="controls">
    <label>League:</label>
    <input type="text" id="leagueInput" value="" placeholder="detecting…" />
    <button id="loadBtn">Load</button>
    <label>Min. price (chaos):</label>
    <input type="number" id="minChaos" value="20" min="0" step="1" />
    <button id="filterBtn">Filter</button>
    <div class="sort-controls">
      <label>Sort:
        <select id="sortSelect">
          <option value="price-desc">Price ↓</option>
          <option value="price-asc">Price ↑</option>
          <option value="name-asc">Name A–Z</option>
          <option value="listings-desc">Listings ↓</option>
          <option value="listings-asc">Listings ↑</option>
        </select>
      </label>
    </div>
  </div>
</header>

<div id="status">
  <div class="spinner" id="spinner"></div>
  <span id="statusText">Detecting current league…</span>
  <span id="count-badge" style="display:none"></span>
</div>

<div id="type-filter">
  <div class="search-wrap">
    <input type="text" id="nameFilter" placeholder="Search items…" />
    <button class="clear-btn" id="clearSearch" title="Clear">×</button>
  </div>
  <div id="ilvl-filter" class="ilvl-group" style="display:none"></div>
</div>

<main>
  <div id="exp-notice" style="display:none; padding: 0 0 0.75rem; font-size: 0.83rem; color: #6a5030; font-style: italic;">
    Indicative prices — item level 83 &amp; 84, no influence
  </div>
  <div class="grid" id="grid"></div>
</main>

<script>
const REPLICA_CATEGORIES = ['UniqueWeapon', 'UniqueArmour', 'UniqueAccessory', 'UniqueFlask', 'UniqueJewel'];

const CATEGORY_LABELS = {
  UniqueWeapon: 'Weapons', UniqueArmour: 'Armour',
  UniqueAccessory: 'Accessories', UniqueFlask: 'Flasks', UniqueJewel: 'Jewels',
  '1H Weapon': '1H Weapons', '2H Weapon': '2H Weapons',
  'Armour': 'Armour', 'Accessory': 'Accessories',
};

const EXP_CATEGORY_ORDER = ['1H Weapon', '2H Weapon', 'Armour', 'Accessory'];

const CACHE_TTL = 60 * 60 * 1000;
const refreshBlockedUntil = { replicas: 0, experimented: 0 };
let btnInterval = null;

let currentTab = 'replicas';
let replicaItems = [];
let experimentedItems = [];
let allItems = [];
let activeType = 'all';
const ILVL_RANGE = [82, 83, 84, 85, 86];
let expIlvlFilter = new Set(
  JSON.parse(localStorage.getItem('exp_ilvl_filter') || 'null') || [83, 84]
);
let minChaosFilter = 20;

function updateLoadBtn() {
  const btn = document.getElementById('loadBtn');
  const remaining = refreshBlockedUntil[currentTab] - Date.now();
  if (remaining > 0) {
    const mins = Math.ceil(remaining / 60000);
    btn.disabled = true;
    btn.textContent = `Load (${mins}m)`;
  } else {
    btn.disabled = false;
    btn.textContent = 'Load';
  }
}

function categorySlug(type) {
  const map = {
    UniqueWeapon: 'weapons', UniqueArmour: 'armours',
    UniqueAccessory: 'accessories', UniqueFlask: 'flasks', UniqueJewel: 'jewels',
  };
  return map[type] || 'weapons';
}

function sortItems(items, mode) {
  const sorted = [...items];
  if (mode === 'price-desc')         sorted.sort((a, b) => b.chaosValue - a.chaosValue);
  else if (mode === 'price-asc')     sorted.sort((a, b) => a.chaosValue - b.chaosValue);
  else if (mode === 'name-asc')      sorted.sort((a, b) => a.name.localeCompare(b.name));
  else if (mode === 'listings-desc') sorted.sort((a, b) => (b.listingCount ?? 0) - (a.listingCount ?? 0));
  else if (mode === 'listings-asc')  sorted.sort((a, b) => (a.listingCount ?? 0) - (b.listingCount ?? 0));
  return sorted;
}

function renderIlvlFilter() {
  const container = document.getElementById('ilvl-filter');
  container.innerHTML = '<span class="ilvl-label">ilvl:</span>';
  for (const ilvl of ILVL_RANGE) {
    const btn = document.createElement('button');
    btn.className = 'ilvl-btn' + (expIlvlFilter.has(ilvl) ? ' active' : '');
    btn.textContent = ilvl;
    btn.addEventListener('click', () => {
      if (expIlvlFilter.has(ilvl)) expIlvlFilter.delete(ilvl);
      else expIlvlFilter.add(ilvl);
      localStorage.setItem('exp_ilvl_filter', JSON.stringify([...expIlvlFilter]));
      btn.classList.toggle('active', expIlvlFilter.has(ilvl));
      applyAndRender();
    });
    container.appendChild(btn);
  }
  container.style.display = 'flex';
}

function renderTypeFilter() {
  const bar = document.getElementById('type-filter');
  bar.querySelectorAll('.type-btn').forEach(b => b.remove());

  if (currentTab === 'experimented') renderIlvlFilter();
  else document.getElementById('ilvl-filter').style.display = 'none';

  const presentTypes = [...new Set(allItems.map(i => i._category))];
  if (presentTypes.length === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');

  let orderedTypes;
  if (currentTab === 'replicas') {
    orderedTypes = REPLICA_CATEGORIES.filter(c => presentTypes.includes(c));
  } else {
    orderedTypes = EXP_CATEGORY_ORDER.filter(c => presentTypes.includes(c));
  }

  for (const type of ['all', ...orderedTypes]) {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (type === activeType ? ' active' : '');
    btn.dataset.type = type;
    btn.addEventListener('click', () => {
      activeType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyAndRender();
    });
    bar.appendChild(btn);
  }
}

function applyAndRender() {
  const league = document.getElementById('leagueInput').value.trim();
  const nameQuery = document.getElementById('nameFilter').value.trim().toLowerCase();

  let preFiltered = allItems;
  if (minChaosFilter > 0) preFiltered = preFiltered.filter(i => i.chaosValue >= minChaosFilter);
  if (currentTab === 'experimented') preFiltered = preFiltered.filter(i => expIlvlFilter.has(i.levelRequired));
  if (nameQuery) preFiltered = preFiltered.filter(i =>
    i.name.toLowerCase().includes(nameQuery) ||
    (i.baseType || '').toLowerCase().includes(nameQuery) ||
    (i.itemType || '').toLowerCase().includes(nameQuery)
  );

  document.querySelectorAll('.type-btn').forEach(btn => {
    const type = btn.dataset.type;
    const total   = type === 'all' ? allItems.length    : allItems.filter(i => i._category === type).length;
    const visible = type === 'all' ? preFiltered.length : preFiltered.filter(i => i._category === type).length;
    const label   = type === 'all' ? 'All' : (CATEGORY_LABELS[type] || type);
    btn.textContent = `${label} (${visible} of ${total})`;
  });

  const filtered = activeType === 'all' ? preFiltered : preFiltered.filter(i => i._category === activeType);
  const sorted = sortItems(filtered, document.getElementById('sortSelect').value);
  renderCards(sorted, league);
  const badge = document.getElementById('count-badge');
  badge.textContent = currentTab === 'replicas' ? `${sorted.length} replicas` : `${sorted.length} items`;

  if (currentTab === 'experimented') {
    const ilvlSorted = [...expIlvlFilter].sort((a, b) => a - b);
    document.getElementById('exp-notice').textContent =
      `Indicative prices — ilvl ${ilvlSorted.join(', ') || '—'}, no influence`;
  }
}

function linkDots(n) {
  let html = '<span class="link-label">';
  for (let i = 0; i < 6; i++) html += `<span class="link-dot${i < n ? ' filled' : ''}"></span>`;
  return html + '</span>';
}

function linkRow(links, chaosValue, listingCount) {
  return `
    <div class="link-row">
      ${linkDots(links ?? 0)}
      <span class="link-price">
        ${Math.round(chaosValue)}
        <img src="/CurrencyRerollRare.png" alt="c" title="Chaos orbs">
      </span>
      <span class="link-listings">${listingCount ?? 0}× listings</span>
    </div>`;
}

function renderCards(items, league) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (items.length === 0) {
    const msg = currentTab === 'replicas' ? 'No replicas above this price.' : 'No experimented items found.';
    grid.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  for (const item of items) {
    const change = item.sparkLine?.totalChange ?? 0;
    const changeClass = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const changeSign = change > 0 ? '+' : '';

    let poeNinjaUrl, nameParts, baseDisplay;

    if (currentTab === 'replicas') {
      poeNinjaUrl = `https://poe.ninja/poe1/economy/${encodeURIComponent(league.toLowerCase())}/unique-${categorySlug(item._category)}/${item.detailsId}`;
      nameParts = item.name.replace(/^(Replica) /, '<span class="replica-word">$1</span> ');
      baseDisplay = item.baseType || '';
    } else {
      poeNinjaUrl = `https://poe.ninja/poe1/economy/${encodeURIComponent(league.toLowerCase())}/base-types/${item.detailsId}`;
      nameParts = item.name;
      baseDisplay = (item.itemType || item._category || '') + (item.levelRequired ? ` · ilvl ${item.levelRequired}` : '');
    }

    const hasLinks = currentTab === 'replicas' && item._linkVariants && item._linkVariants.length > 0;

    let linksHtml = '';
    if (hasLinks) {
      linksHtml = '<div class="links-table">';
      linksHtml += linkRow(item.links ?? 0, item.chaosValue, item.listingCount ?? item.count);
      for (const v of item._linkVariants) linksHtml += linkRow(v.links ?? 0, v.chaosValue, v.listingCount ?? v.count);
      linksHtml += '</div>';
    }

    const card = document.createElement('a');
    card.className = 'card';
    card.href = poeNinjaUrl;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.innerHTML = `
      <div class="card-top">
        ${item.icon ? `<img class="card-icon" src="${item.icon}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="card-info">
          <div class="card-name">${nameParts}</div>
          <div class="card-base">${baseDisplay}</div>
        </div>
      </div>
      ${hasLinks ? linksHtml : `
      <div class="card-footer">
        <div class="price">
          ${Math.round(item.chaosValue)}
          <img class="chaos-icon" src="/CurrencyRerollRare.png" alt="c" title="Chaos orbs">
        </div>
        <span class="change ${changeClass}">${changeSign}${change.toFixed(0)}%</span>
        <span class="listings">${item.listingCount ?? item.count ?? 0}× listings</span>
      </div>`}
    `;
    grid.appendChild(card);
  }
}

function processReplicaItems(rawItems) {
  const grouped = new Map();
  for (const item of rawItems) {
    const key = item._category + '||' + item.name;
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(item);
  }
  const merged = [];
  for (const variants of grouped.values()) {
    variants.sort((a, b) => (a.links ?? 0) - (b.links ?? 0));
    const primary = variants[0];
    primary._linkVariants = variants.slice(1);
    merged.push(primary);
  }
  return merged;
}

async function load() {
  const league = document.getElementById('leagueInput').value.trim();
  const minChaos = parseFloat(document.getElementById('minChaos').value) || 0;
  if (!league) { alert('Enter a league name.'); return; }

  const btn = document.getElementById('loadBtn');
  const spinner = document.getElementById('spinner');
  const statusText = document.getElementById('statusText');
  const badge = document.getElementById('count-badge');

  btn.disabled = true;
  spinner.classList.add('active');
  badge.style.display = 'none';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('type-filter').classList.remove('visible');
  statusText.textContent = 'Loading data from poe.ninja…';

  const endpoint = currentTab === 'replicas'
    ? `/api/data?league=${encodeURIComponent(league)}`
    : `/api/experimented?league=${encodeURIComponent(league)}`;

  try {
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    let processed;
    if (currentTab === 'replicas') {
      processed = processReplicaItems(data.items || []);
      replicaItems = processed;
    } else {
      processed = data.items || [];
      experimentedItems = processed;
    }
    allItems = processed;
    activeType = 'all';

    renderTypeFilter();
    applyAndRender();
    badge.style.display = 'inline';

    refreshBlockedUntil[currentTab] = data.timestamp + CACHE_TTL;
    if (btnInterval) clearInterval(btnInterval);
    btnInterval = setInterval(updateLoadBtn, 30000);
    updateLoadBtn();

    const ageMins = Math.round((Date.now() - data.timestamp) / 60000);
    const ageStr = data.fromCache ? ` (cached ${ageMins}m ago)` : '';
    if (data.errors && data.errors.length) {
      statusText.innerHTML = `<span class="error-msg">Errors: ${data.errors.join(', ')}</span>`;
    } else {
      statusText.textContent = `Loaded — league "${league}", min. ${minChaos}c${ageStr}.`;
    }
  } catch (e) {
    statusText.innerHTML = `<span class="error-msg">Error: ${e.message}</span>`;
    updateLoadBtn();
  } finally {
    spinner.classList.remove('active');
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  allItems = tab === 'replicas' ? replicaItems : experimentedItems;
  activeType = 'all';

  updateLoadBtn();
  const notice = document.getElementById('exp-notice');
  if (tab === 'experimented') {
    const ilvlSorted = [...expIlvlFilter].sort((a, b) => a - b);
    notice.textContent = `Indicative prices — ilvl ${ilvlSorted.join(', ') || '—'}, no influence`;
    notice.style.display = 'block';
  } else {
    notice.style.display = 'none';
  }

  if (allItems.length > 0) {
    renderTypeFilter();
    applyAndRender();
    document.getElementById('count-badge').style.display = 'inline';
  } else {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('type-filter').classList.remove('visible');
    document.getElementById('count-badge').style.display = 'none';
    const league = document.getElementById('leagueInput').value;
    document.getElementById('statusText').textContent =
      `League: ${league} — no data yet, click Load.`;
  }
}

document.getElementById('loadBtn').addEventListener('click', load);
document.getElementById('filterBtn').addEventListener('click', () => {
  minChaosFilter = parseFloat(document.getElementById('minChaos').value) || 0;
  applyAndRender();
});
document.getElementById('sortSelect').addEventListener('change', applyAndRender);
document.getElementById('leagueInput').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
document.getElementById('nameFilter').addEventListener('input', () => {
  document.getElementById('clearSearch').classList.toggle('visible',
    document.getElementById('nameFilter').value.length > 0);
  applyAndRender();
});
document.getElementById('clearSearch').addEventListener('click', () => {
  document.getElementById('nameFilter').value = '';
  document.getElementById('clearSearch').classList.remove('visible');
  applyAndRender();
});
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

const SKIP_LEAGUES = new Set(['Standard', 'Hardcore', 'SSF Standard', 'SSF Hardcore']);

async function detectCurrentLeague() {
  const input = document.getElementById('leagueInput');
  const statusText = document.getElementById('statusText');

  try {
    const res = await fetch('/api/leagues');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const leagues = data.result ?? data;
    const challenge = leagues.find(l =>
      !SKIP_LEAGUES.has(l.id) && !l.id.startsWith('SSF ') && !l.id.startsWith('Hardcore ')
    );
    input.value = challenge ? challenge.id : 'Standard';
  } catch (e) {
    input.value = 'Standard';
    statusText.textContent = 'League detection error: ' + e.message;
    return;
  }

  const league = input.value;
  try {
    const res = await fetch(`/api/cache-status?league=${encodeURIComponent(league)}`);
    const status = await res.json();
    if (!status.timestamp) {
      statusText.textContent = `League: ${league} — no data yet, click Load.`;
    } else if (!status.fresh) {
      const ageMins = Math.round((Date.now() - status.timestamp) / 60000);
      statusText.innerHTML = `League: ${league} — <strong>data is ${ageMins}m old</strong>, click Load to refresh.`;
    } else {
      refreshBlockedUntil.replicas = status.timestamp + CACHE_TTL;
      load();
    }
  } catch (e) {
    statusText.textContent = `League: ${league} — click Load to fetch data.`;
  }
}

detectCurrentLeague();
</script>
